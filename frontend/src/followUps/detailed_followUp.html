<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#F05323",
                        "primary-hover": "#D94418",
                        "background-light": "#F4F6F8",
                        "surface-light": "#FFFFFF",
                        "text-primary-light": "#1F2937",
                        "text-secondary-light": "#6B7280",
                        "border-light": "#E5E7EB",
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        xl: "1rem",
                        "2xl": "1.5rem",
                    },
                    boxShadow: {
                        soft: "0 2px 15px -3px rgba(0,0,0,0.07), 0 4px 6px -2px rgba(0,0,0,0.05)",
                    }
                }
            }
        };
    </script>

    <style type="text/tailwindcss">
        body { font-family: 'Roboto', sans-serif; }
        h1, h2, h3, .font-display, p { font-family: 'Roboto Condensed', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }

        @layer components {
            .field-label {
                @apply block text-[10px] font-bold text-text-secondary-light uppercase tracking-wider mb-1;
            }
            .field-value {
                @apply text-text-primary-light font-bold text-base;
            }
            .edit-input {
                @apply border border-border-light rounded-lg px-2 py-1 text-sm w-full focus:outline-none focus:ring-1 focus:ring-primary;
            }
            .select-disabled {
                @apply opacity-40 cursor-not-allowed bg-gray-50;
            }
        }
    </style>

    <title>Ternium — Seguimiento</title>
</head>

<body class="bg-background-light text-slate-900">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
    <div class="flex h-full flex-col min-h-0">

        <!-- HEADER -->
        <header id="headerWidget"
            class="font-[Manrope] bg-white w-full px-5 z-20 flex justify-between items-center shadow-lg shrink-0">
        </header>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col px-4 sm:px-6 lg:px-8 py-7 overflow-y-auto custom-scrollbar">
            <div class="max-w-6xl mx-auto w-full flex flex-col flex-1">

                <!-- PAGE HEADER -->
                <div class="mb-5 flex flex-col md:flex-row md:items-end justify-between gap-4">
                    <div>
                        <div class="flex items-center gap-2 text-text-secondary-light text-xs font-bold uppercase tracking-widest">
                            <a id="returnListView" href="#" class="hover:text-primary cursor-pointer">Seguimientos</a>
                            <span class="material-symbols-outlined text-[10px]">chevron_right</span>
                            <span id="upperId">—</span>
                        </div>
                        <h1 class="text-4xl font-bold uppercase text-text-primary-light">
                            Panel de Seguimiento
                        </h1>
                    </div>

                    <div class="flex space-x-3">
                        <!-- View mode: Editar / Eliminar -->
                        <button id="editButton"
                            class="bg-white border border-primary text-primary hover:bg-orange-50 font-bold uppercase text-xs px-6 py-2.5 rounded shadow-sm flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">edit</span> Editar
                        </button>

                        <!-- Create mode: Guardar -->
                        <button id="saveButton"
                            class="hidden bg-primary hover:bg-primary-hover text-white font-bold uppercase text-xs px-6 py-2.5 rounded shadow-sm flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">save</span> Guardar
                        </button>
                    </div>
                </div>

                <!-- GRID -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">

                    <!-- LEFT -->
                    <div class="lg:col-span-2 flex flex-col gap-6">

                        <!-- INFO CARD -->
                        <div class="flex flex-col bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-hidden relative">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-primary"></div>

                            <h3 class="text-xs font-bold text-primary uppercase tracking-widest mb-4">
                                Información del Seguimiento
                            </h3>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-5">

                                <!-- Clave seguimiento -->
                                <div class="flex flex-col">
                                    <label class="field-label">Clave Seguimiento</label>
                                    <span id="followUpID" class="field-value">—</span>
                                </div>

                                <!-- Cliente -->
                                <div class="flex flex-col">
                                    <label class="field-label">Cliente</label>
                                    <!-- VIEW -->
                                    <span id="platformCustomer" class="field-value">—</span>
                                    <!-- CREATE -->
                                    <select id="customer-select" class="hidden edit-input">
                                        <option value="">Selecciona un cliente</option>
                                    </select>
                                </div>

                                <!-- Consignatario -->
                                <div class="flex flex-col">
                                    <label class="field-label">Consignatario</label>
                                    <!-- VIEW -->
                                    <span id="platformConsignee" class="field-value">—</span>
                                    <!-- CREATE -->
                                    <select id="consignee-select" class="hidden edit-input select-disabled" disabled>
                                        <option value="">Primero selecciona un cliente</option>
                                    </select>
                                </div>

                                <!-- Tarima -->
                                <div class="flex flex-col">
                                    <label class="field-label">Tarima</label>
                                    <!-- VIEW -->
                                    <span id="platformName" class="field-value">—</span>
                                    <!-- CREATE -->
                                    <select id="platform-select" class="hidden edit-input select-disabled" disabled>
                                        <option value="">Primero selecciona un consignatario</option>
                                    </select>
                                </div>

                                <!-- Dirección -->
                                <div class="flex flex-col">
                                    <label class="field-label">Dirección de Envío</label>
                                    <span id="address" class="field-value">—</span>
                                </div>

                                <!-- Estado -->
                                <div class="flex flex-col">
                                    <label class="field-label">Estado</label>
                                    <div id="status"></div>
                                    <!-- Edit mode (view mode only) -->
                                    <select id="status-edit" class="hidden edit-input">
                                        <option value="pending">Pendiente</option>
                                        <option value="inPreparation">Preparación</option>
                                        <option value="inTransit">En tránsito</option>
                                        <option value="delivered">Entregado</option>
                                        <option value="dismantled">Desarmada</option>
                                    </select>
                                </div>

                                <!-- Fecha de Creación -->
                                <div class="flex flex-col">
                                    <label class="field-label">Fecha de Creación</label>
                                    <span id="createdAt" class="field-value">—</span>
                                </div>

                                <!-- Fecha de Actualización -->
                                <div class="flex flex-col">
                                    <label class="field-label">Fecha de Actualización</label>
                                    <span id="updatedAt" class="field-value">—</span>
                                </div>

                                <div class="col-span-2 md:col-span-4 space-y-2">
                                    <label class="text-xs font-bold text-slate-500 uppercase tracking-tight">Comentarios Adicionales</label>
                                    <div id="comment" class="spec-view w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-4 text-sm font-medium text-slate-900 min-h-[80px]"></div>
                                    <textarea id="comment-edit" class="spec-edit hidden w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-4 text-sm font-medium focus:ring-primary" rows="3" placeholder="Ingrese comentarios..."></textarea>
                                </div>

                            </div>
                        </div>

                        <!-- PRODUCT TABLE -->
                        <div class="bg-white rounded-xl shadow-soft flex flex-col border border-border-light flex-1 min-h-0">

                            <div class="p-4 border-b border-border-light flex justify-between items-center bg-gray-50/50">
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-primary text-xl">view_list</span>
                                    <h3 class="font-bold uppercase text-text-primary-light">Carga de Tarima</h3>
                                    <button id="redirectPlatformBtn" class="hidden items-center">
                                        <span class="redirectPlatform text-[15px] material-symbols-outlined text-primary">open_in_new</span>
                                    </button>
                                </div>
                                <div id="totalPieces" class="text-xs font-bold text-text-secondary-light">
                                    Total Piezas: 0
                                </div>
                            </div>

                            <div class="overflow-x-auto flex-1">
                                <table class="w-full text-left">
                                    <thead class="bg-gray-50 text-[10px] uppercase font-bold text-text-secondary-light border-b border-border-light">
                                        <tr>
                                            <th class="px-6 py-3">SKU</th>
                                            <th class="px-6 py-3">Descripción</th>
                                            <th class="px-6 py-3 text-center">Cantidad</th>
                                            <th class="px-6 py-3 text-center">D. Interno</th>
                                            <th class="px-6 py-3 text-center">D. Externo</th>
                                            <th class="px-6 py-3 text-right">Peso Unit.</th>
                                        </tr>
                                    </thead>
                                    <tbody id="productTableBody" class="divide-y divide-border-light"></tbody>
                                </table>
                            </div>

                        </div>
                    </div>

                    <!-- RIGHT PANEL -->
                    <div class="bg-white rounded-xl shadow-soft border border-border-light flex flex-col relative overflow-hidden min-h-0">

                        <div class="absolute top-3 left-3 z-10 bg-white/90 px-2 py-1 rounded shadow border border-border-light">
                            <h3 class="text-[10px] font-bold uppercase flex items-center gap-1">
                                <span class="material-symbols-outlined text-primary text-xs">3d_rotation</span>
                                Visualización
                            </h3>
                        </div>

                        <div class="w-full h-full bg-gray-100 flex items-center justify-center">
                            <div class="text-xs text-gray-400">Vista 3D aquí</div>
                        </div>

                    </div>

                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="h-8 bg-white border-t border-slate-200 px-6 flex items-center justify-between shrink-0">
            <p class="text-[10px] text-slate-400">© 2026 Ternium Flow</p>
        </footer>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="./detailed_followUp.js"></script>
</body>
</html>
