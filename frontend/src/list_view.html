<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ternium Clientes Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=notifications" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#F05323",
                        "primary-hover": "#D94418",
                        "background-light": "#F4F6F8",
                        "background-dark": "#1a1c23",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#252830",
                        "text-primary-light": "#333333",
                        "text-primary-dark": "#E2E8F0",
                        "text-secondary-light": "#64748B",
                        "text-secondary-dark": "#94A3B8",
                        "border-light": "#E2E8F0",
                        "border-dark": "#374151",
                    },
                    fontFamily: { "display": ["Manrope"] },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)' }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-slate-200 rounded-full; }
        }
    </style>
</head>

<!--
    LAYOUT:
    - body: flex flex-col h-screen  →  header | main(flex-1) | footer(shrink-0)
    - main: overflow-y-auto         →  si el viewport es pequeño, main hace scroll
    - card: flex flex-col           →  sin altura fija; crece con el contenido
    - tabla: max-h + overflow-y-auto →  la tabla tiene su propio scroll interno
    - paginación: siempre fuera del scroll de la tabla, siempre visible
-->
<body class="bg-background-light h-screen flex flex-col font-display">

    <header class="bg-white w-full px-5 z-20 flex justify-between items-center shadow-lg shrink-0">
        <div class="flex items-center gap-2">
            <img alt="Logo Ternium" class="h-8 ml-5"
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Ternium_Logo.svg/1280px-Ternium_Logo.svg.png">
        </div>
        <nav class="hidden md:flex items-center justify-center gap-6">
            <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="/frontend/src/home.html">Inicio</a>
            <a class="text-primary text-sm font-semibold border-b-2 border-primary py-5" href="#">Clientes</a>
            <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="#">Comercial</a>
            <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="#">Productos</a>
            <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="#">Paquetes</a>
            <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="#">Seguimiento</a>
            <a class="text-slate-500 text-sm font-medium hover:text-primary transition-colors" href="#">Usuarios</a>
        </nav>
        <button class="size-9 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100">
            <span class="material-symbols-outlined text-xl">notifications</span>
        </button>
    </header>

    <!-- main hace scroll solo cuando el viewport es muy pequeño -->
    <main class="flex-1 min-h-0 overflow-y-auto custom-scrollbar">
        <div class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col h-full">

            <div class="mb-6 shrink-0">
                <h1 class="text-4xl font-extrabold tracking-tight">CLIENTES</h1>
            </div>

            <!-- Card: flex-1 para ocupar el espacio restante, flex-col para apilar sus hijos -->
            <div class="bg-surface-light rounded-xl shadow-soft overflow-hidden flex flex-col flex-1 min-h-0">

                <!-- Barra de búsqueda y botón: nunca se encoge -->
                <div class="px-6 py-3 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-border-light shrink-0">
                    <div class="w-full md:w-1/2 lg:w-1/3 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-icons text-gray-400 text-lg">search</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-12 py-2.5 border-none rounded-lg bg-background-light text-text-primary-light placeholder-gray-400 focus:ring-2 focus:ring-primary focus:bg-white transition-all font-display uppercase tracking-wide text-sm"
                            placeholder="Buscar cliente..." type="text" />
                        <button class="absolute inset-y-0 right-0 pr-2 flex items-center">
                            <div class="bg-primary hover:bg-primary-hover text-white rounded-md p-1 transition-colors">
                                <span class="material-icons text-sm block">arrow_forward</span>
                            </div>
                        </button>
                    </div>
                    <button
                        class="w-full md:w-auto bg-primary hover:bg-primary-hover text-white font-display font-bold uppercase text-sm px-6 py-2.5 rounded-lg shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2 group">
                        <span class="material-icons text-lg group-hover:scale-110 transition-transform">add</span>
                        Nuevo Cliente
                    </button>
                </div>

                <!-- Zona tabla: flex-1 + overflow-y-auto → la tabla scrollea aquí -->
                <div class="flex-1 min-h-0 overflow-y-auto overflow-x-auto custom-scrollbar bg-gray-50 px-6 py-3">
                    <div class="w-full bg-white rounded-lg border">
                        <table class="min-w-full">
                            <thead class="bg-gray-50 top-0 z-10">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-bold text-text-secondary-light uppercase tracking-wider font-display" scope="col">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-bold text-text-secondary-light uppercase tracking-wider font-display" scope="col">Razón Social</th>
                                    <th class="px-6 py-3 text-left text-xs font-bold text-text-secondary-light uppercase tracking-wider font-display" scope="col">RFC</th>
                                    <th class="px-6 py-3 text-left text-xs font-bold text-text-secondary-light uppercase tracking-wider font-display" scope="col">Contacto</th>
                                    <th class="px-6 py-3 text-left text-xs font-bold text-text-secondary-light uppercase tracking-wider font-display" scope="col">Estado</th>
                                    <th class="px-6 py-3 text-right text-xs font-bold text-text-secondary-light uppercase tracking-wider font-display" scope="col">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listViewBody" class="bg-white divide-y divide-border-light"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Paginación: shrink-0 → siempre visible, nunca dentro del scroll de la tabla -->
                <div class="shrink-0 py-2 px-6 bg-gray-50 border-t border-border-light flex items-center justify-center gap-2"></div>

            </div><!-- fin card -->
        </div>
    </main>

    <footer class="h-8 shrink-0 bg-white border-t border-slate-200 px-6 flex items-center justify-between z-50">
        <p class="text-[10px] text-slate-400">© 2026 Ternium Flow</p>
    </footer>

</body>
<script src="js/list_view_body.js"></script>
</html>
