<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#F05323",
                        "primary-hover": "#D94418",
                        "background-light": "#F4F6F8",
                        "background-dark": "#111827",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1F2937",
                        "text-primary-light": "#1F2937",
                        "text-primary-dark": "#F9FAFB",
                        "text-secondary-light": "#6B7280",
                        "text-secondary-dark": "#9CA3AF",
                        "border-light": "#E5E7EB",
                        "border-dark": "#374151",
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '1rem',
                        '2xl': '1.5rem',
                    },
                    boxShadow: {
                        'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        body { font-family: 'Roboto', sans-serif; }
        h1, h2, h3, .font-display { font-family: 'Roboto Condensed', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
        @layer components {
            .field-label  { @apply block text-[10px] font-bold text-text-secondary-light uppercase tracking-wider mb-1; }
            .field-value  { @apply text-text-primary-light font-bold text-sm; }
            .field-input  { @apply border border-border-light rounded-lg px-2 py-1 text-sm w-full; }
        }
    </style>
    <title>Ternium — Producto</title>
</head>

<body class="bg-background-light font-display text-slate-900">
    <div class="relative flex h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <header id="headerWidget"
                class="font-[Manrope] bg-white w-full px-5 z-20 flex justify-between items-center shadow-lg shrink-0">
            </header>

            <main class="flex-1 overflow-y-auto px-4 sm:px-6 lg:px-8 py-5 custom-scrollbar">
                <div class="max-w-6xl mx-auto">

                    <!-- Breadcrumbs & Header -->
                    <div class="mb-5 flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div>
                            <div
                                class="flex items-center gap-2 text-text-secondary-light text-xs font-bold uppercase tracking-widest">
                                <a id="returnListView" class="hover:text-primary cursor-pointer">Productos</a>
                                <span class="material-symbols-outlined text-[10px]">chevron_right</span>
                                <span id="upperID">—</span>
                            </div>
                            <h1
                                class="text-4xl font-display font-bold text-text-primary-light tracking-tight uppercase">
                                Panel de Producto</h1>
                        </div>
                        <div class="flex space-x-3">
                            <button id="editButton"
                                class="bg-white border border-primary text-primary hover:bg-orange-50 font-[Manrope] font-bold uppercase text-xs px-6 py-2.5 rounded shadow-sm transition-all flex items-center gap-2">
                                <span class="material-symbols-outlined text-sm">edit</span> Editar
                            </button>
                            <button id="deleteButton"
                                class="hidden bg-primary hover:bg-primary-hover text-white font-[Manrope] font-bold uppercase text-xs px-6 py-2.5 rounded shadow-sm transition-all flex items-center gap-2">
                                <span class="material-symbols-outlined text-sm">delete</span> Eliminar
                            </button>
                        </div>
                    </div>

                    <!-- Grid principal -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

                        <!-- Columna izquierda: info general + specs -->
                        <div class="lg:col-span-2 space-y-6">

                            <!-- Info General -->
                            <div
                                class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-hidden relative">
                                <div class="absolute top-0 left-0 w-1.5 h-full bg-primary"></div>
                                <h3 class="text-xs font-bold text-primary uppercase tracking-widest mb-4">Información
                                    del Producto</h3>
                                <div class="grid grid-cols-2 gap-5">

                                    <div class="flex flex-col">
                                        <label class="field-label">ID</label>
                                        <span id="productID" class="field-value text-base"></span>
                                    </div>

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Número de Parte</label>
                                        <span id="productSKU" class="view field-value text-base"></span>
                                        <input id="productSKU-edit" class="edit hidden field-input"
                                            autocomplete="off" />
                                    </div>

                                    <!-- Nombre -->
                                    <div class="editable flex flex-col">
                                        <label class="field-label">Nombre</label>
                                        <span id="productName" class="view field-value text-base"></span>
                                        <input id="productName-edit" class="edit hidden field-input"
                                            autocomplete="off" />
                                    </div>

                                    <!-- Familia -->
                                    <div class="editable flex flex-col">
                                        <label class="field-label">Familia</label>
                                        <span id="productFamilia" class="view field-value"></span>
                                        <input id="productFamilia-edit" class="edit hidden field-input"
                                            autocomplete="off" />
                                    </div>

                                    <!-- Estado -->
                                    <div class="flex flex-col">
                                        <label class="field-label">Estado</label>
                                        <div id="productStatus" class="field-value"></div>
                                        <select id="productStatus-edit" class="hidden field-input">
                                            <option value="Activo">Activo</option>
                                            <option value="Inactivo">Inactivo</option>
                                        </select>
                                    </div>

                                </div>
                            </div>

                            <!-- Especificaciones Técnicas -->
                            <div
                                class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 overflow-hidden relative">
                                <div class="absolute top-0 left-0 w-1.5 h-full bg-primary"></div>
                                <h3 class="text-xs font-bold text-primary uppercase tracking-widest mb-4">
                                    Especificaciones Técnicas</h3>
                                <div class="grid grid-cols-2 sm:grid-cols-3 gap-5">

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Calibre</label>
                                        <span id="productCalibro" class="view field-value"></span>
                                        <input id="productCalibro-edit" class="edit hidden field-input"
                                            autocomplete="off" />
                                    </div>

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Espesor</label>
                                        <span id="productEspesor" class="view field-value"></span>
                                        <input id="productEspesor-edit" type="number" step="0.001"
                                            class="edit hidden field-input" />
                                    </div>

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Largo (m)</label>
                                        <span id="productLargo" class="view field-value"></span>
                                        <input id="productLargo-edit" type="number" step="0.01"
                                            class="edit hidden field-input" />
                                    </div>

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Peso Unitario (kg)</label>
                                        <span id="productPeso" class="view field-value"></span>
                                        <input id="productPeso-edit" type="number" step="0.01"
                                            class="edit hidden field-input" />
                                    </div>

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Diámetro Interno (cm)</label>
                                        <span id="productDiametroInt" class="view field-value"></span>
                                        <input id="productDiametroInt-edit" type="number" step="0.01"
                                            class="edit hidden field-input" />
                                    </div>

                                    <div class="editable flex flex-col">
                                        <label class="field-label">Diámetro Externo (cm)</label>
                                        <span id="productDiametroExt" class="view field-value"></span>
                                        <input id="productDiametroExt-edit" type="number" step="0.01"
                                            class="edit hidden field-input" />
                                    </div>

                                </div>
                            </div>

                        </div>

                        <div
                            class="bg-surface-light rounded-xl shadow-soft border border-border-light flex flex-col relative overflow-hidden group">
                            <div
                                class="absolute top-3 left-3 z-10 bg-white/90 backdrop-blur-sm px-2 py-1 rounded shadow-sm border border-border-light">
                                <h3
                                    class="text-[10px] font-display font-bold text-text-primary-light uppercase flex items-center gap-1">
                                    <span class="material-symbols-outlined text-primary text-xs">3d_rotation</span>
                                    Visualización de Producto
                                </h3>
                            </div>
                            <div class="w-full h-full bg-gray-100 flex items-center justify-center relative">
                                <div class="absolute inset-0"
                                    style="background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px); background-size: 15px 15px; opacity: 0.5;">
                                </div>
                                <div
                                    class="relative w-32 h-40 transform rotate-x-6 rotate-z-6 transition-transform duration-500 group-hover:scale-105">
                                    <div class="absolute bottom-0 w-full h-3 bg-[#8B4513] rounded-sm shadow-lg"></div>
                                    <div
                                        class="absolute bottom-3 left-0 w-full h-8 bg-gray-400 border border-gray-500 rounded-sm">
                                    </div>
                                    <div
                                        class="absolute bottom-11 left-0 w-full h-8 bg-gray-400 border border-gray-500 rounded-sm">
                                    </div>
                                    <div
                                        class="absolute bottom-20 left-0 w-full h-8 bg-gray-300 border border-gray-400 rounded-sm scale-[0.9]">
                                    </div>
                                    <div
                                        class="absolute bottom-29 left-0 w-full h-8 bg-gray-300 border border-gray-400 rounded-sm scale-[0.9]">
                                    </div>
                                    <div
                                        class="absolute inset-0 bg-primary/10 border-2 border-primary/30 rounded-lg pointer-events-none">
                                    </div>
                                </div>
                                <div class="absolute bottom-3 right-3 flex flex-col gap-1">
                                    <button
                                        class="p-1.5 bg-white rounded shadow hover:text-primary transition-colors border border-border-light dark:border-border-dark">
                                        <span class="material-symbols-outlined text-xs">zoom_in</span>
                                    </button>
                                    <button
                                        class="p-1.5 bg-white rounded shadow hover:text-primary transition-colors border border-border-light dark:border-border-dark">
                                        <span class="material-symbols-outlined text-xs">zoom_out</span>
                                    </button>
                                    <button
                                        class="p-1.5 bg-white rounded shadow hover:text-primary transition-colors border border-border-light dark:border-border-dark">
                                        <span class="material-symbols-outlined text-xs">fullscreen</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </main>

            <!-- FOOTER -->
            <footer class="h-8 shrink-0 bg-white border-t border-slate-200 px-6 flex items-center justify-between z-50">
                <p class="text-[10px] text-slate-400">© 2026 Ternium Flow</p>
            </footer>

            <!-- Delete Modal -->
            <div id="deleteModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
                <div class="bg-white rounded-xl shadow-xl p-6 max-w-sm w-full mx-4">
                    <h3 class="text-lg font-bold text-text-primary-light mb-2">¿Eliminar producto?</h3>
                    <p class="text-sm text-text-secondary-light mb-6">Esta acción no se puede deshacer.</p>
                    <div class="flex justify-end gap-3">
                        <button id="cancelDelete"
                            class="px-4 py-2 text-sm font-bold border border-border-light rounded hover:bg-gray-50 transition">Cancelar</button>
                        <button id="confirmDelete"
                            class="px-4 py-2 text-sm font-bold bg-primary hover:bg-primary-hover text-white rounded transition">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script type="module" src="../shared/header.js"></script>
<script type="module" src="./detailed_product.js"></script>

</html>
