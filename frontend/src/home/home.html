<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ternium Flow Home Page</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link 
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F25C29",
                        "background-light": "#f8f7f5",
                        "background-dark": "#231a0f",
                        "light-gray-slate": "#f1f5f9"
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                @apply bg-slate-200 rounded-full;
            }
        }
    </style>
</head>

<body class="bg-background-light font-display text-slate-900 flex flex-col h-screen">

    <!-- Zona scrollable: ocupa todo el espacio entre header y footer -->
    <div id="scroll-root" class="flex-1 min-h-0 overflow-hidden flex flex-col">

        <header id="headerWidget" class="bg-white w-full px-5 z-20 flex justify-between items-center shadow-lg shrink-0">
            <div class="h-16 bg-white shadow"></div>
        </header>
        <!-- Fila aside + main: min-h-0 para que respeten el límite del padre -->
        <div class="flex flex-1 min-h-0">
            <!-- Aside: altura completa del espacio disponible, scroll interno propio -->
            <aside class="w-[450px] shrink-0 border-r border-slate-200 bg-white flex flex-col overflow-hidden">
                <div class="px-6 pt-4 flex justify-between items-center">
                    <h1 id="asideTitle" class="text-2xl font-extrabold tracking-tight"></h1>
                </div>
                <div id="asideSubtitle"></div>
                <div id="asideWidgets" class="flex-1 overflow-y-auto custom-scrollbar p-4"></div>
            </aside>

            <!-- Main: scroll propio, independiente del aside -->
            <main class="flex-1 overflow-y-auto custom-scrollbar px-8 py-5 space-y-5 bg-slate-50">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div
                        class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-3">
                                <div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                                    <span class="material-symbols-outlined">dataset</span>
                                </div>
                                <div>
                                    <h3 class="font-bold text-lg">Seguimientos</h3>
                                    <p class="text-slate-500 text-xs">Seguimientos de tarimas en los últimos 7 días</p>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-4 gap-4">
                            <div class="bg-light-gray-slate p-4 rounded-xl border border-slate-100">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total</p>
                                <p class="text-2xl font-extrabold">216</p>
                            </div>
                            <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                                <p class="text-[10px] font-bold text-emerald-600/80 uppercase tracking-widest mb-1">Entregadas</p>
                                <p class="text-2xl font-extrabold text-emerald-600">112</p>
                            </div>
                            <div class="bg-rose-50 p-4 rounded-xl border border-rose-100">
                                <p class="text-[10px] font-bold text-rose-600/80 uppercase tracking-widest mb-1">Desarmadas</p>
                                <p class="text-2xl font-extrabold text-rose-600">8</p>
                            </div>
                            <div class="bg-primary/5 p-4 rounded-xl border border-primary/10">
                                <p class="text-[10px] font-bold text-primary uppercase tracking-widest mb-1">En tránsito</p>
                                <p class="text-2xl font-extrabold text-primary">84</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-primary p-6 rounded-2xl shadow-xl shadow-primary/20 text-white flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-md mb-1">Resumen de Operaciones</h3>
                            <p class="text-xs opacity-80">Rendimiento de la semana</p>
                        </div>
                        <div class="flex items-end justify-between">
                            <div class="text-4xl font-extrabold">93.3%</div>
                            <div class="flex flex-col items-end">
                                <span class="text-[10px] font-bold uppercase">Eficiencia</span>
                                <span class="material-symbols-outlined">trending_up</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                    <div class="p-6 border-b border-slate-100 flex flex-wrap gap-4 items-center justify-between">
                        <div>
                            <h3 id="platformsTitle" class="text-slate-900 text-xl font-extrabold tracking-tight"></h3>
                            <p id="platformsSubtitle" class="hidden text-slate-500 text-xs">Preestablecidos de tarimas</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button
                                id="newPlatformButton" class="flex items-center gap-2 px-4 py-2 bg-primary text-white text-xs font-bold rounded-lg hover:brightness-110 transition-all">
                                <span class="material-symbols-outlined text-sm">add_circle</span>
                            </button>
                        </div>
                    </div>
                    <div class="h-[40vh] overflow-auto">
                        <table class="w-full text-left">
                            <thead class="bg-light-gray-slate sticky top-0">
                                <tr id="platformsTableRow"></tr>
                            </thead>
                            <tbody id="tableDataContent" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

    </div><!-- fin #scroll-root -->

    <!-- Footer: shrink-0 garantiza que NUNCA se comprima ni desaparezca -->
    <footer class="h-8 shrink-0 bg-white border-t border-slate-200 px-6 flex items-center justify-between z-50">
        <p class="text-[10px] text-slate-400">© 2026 Ternium Flow</p>
    </footer>

    <div id="rejectModal" class="hidden"></div>

</body>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="./home.js"></script>
</html>
